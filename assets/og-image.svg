<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>

    <!-- Holographic rainbow effect for disc -->
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="20%" stop-color="#feca57"/>
      <stop offset="40%" stop-color="#48dbfb"/>
      <stop offset="60%" stop-color="#ff9ff3"/>
      <stop offset="80%" stop-color="#54a0ff"/>
      <stop offset="100%" stop-color="#5f27cd"/>
    </linearGradient>

    <!-- Disc base gradient -->
    <linearGradient id="disc-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="50%" stop-color="#f5f5fa"/>
      <stop offset="100%" stop-color="#d8d8e8"/>
    </linearGradient>

    <!-- Label gradient -->
    <linearGradient id="label-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d4a"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Disc shadow -->
    <filter id="disc-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="6" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Neon glow for title -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star pattern for background -->
    <pattern id="stars" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="20" r="1" fill="#fff" opacity="0.2"/>
      <circle cx="50" cy="10" r="0.5" fill="#fff" opacity="0.3"/>
      <circle cx="80" cy="60" r="1" fill="#fff" opacity="0.15"/>
      <circle cx="30" cy="80" r="0.5" fill="#fff" opacity="0.2"/>
      <circle cx="90" cy="90" r="1" fill="#fff" opacity="0.15"/>
    </pattern>

    <!-- Curved path for demo.cd text on bottom left edge of disc -->
    <path id="disc-edge-path" d="M 15,200 A 185,185 0 0,0 200,385" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  <rect width="1200" height="630" fill="url(#stars)" opacity="0.4"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- All content wrapped in a group for centering -->
  <g transform="translate(90, 0)">
    <!-- Terminal Window -->
    <g transform="translate(100, 80)" filter="url(#shadow)">
      <!-- Terminal window frame -->
      <rect width="600" height="340" rx="12" fill="#16161e"/>

      <!-- Terminal header -->
      <rect width="600" height="40" rx="12" fill="#16161e"/>
      <rect y="28" width="600" height="12" fill="#16161e"/>

      <!-- Traffic lights -->
      <circle cx="24" cy="20" r="7" fill="#f7768e"/>
      <circle cx="48" cy="20" r="7" fill="#e0af68"/>
      <circle cx="72" cy="20" r="7" fill="#9ece6a"/>

      <!-- Title in header -->
      <text x="300" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#565f89">dvd</text>

      <!-- Terminal body -->
      <rect y="40" width="600" height="300" fill="#1a1b26"/>

      <!-- Terminal text lines -->
      <g font-family="'SF Mono', 'Monaco', 'Menlo', monospace" font-size="15">
        <text x="24" y="80" fill="#bb9af7">$</text>
        <text x="44" y="80" fill="#c0caf5"> dvd record demo.cd</text>

        <text x="24" y="115" fill="#565f89">...</text>
        <text x="55" y="115" fill="#73daca">Executing demo.cd</text>

        <text x="24" y="155" fill="#9ece6a">✓</text>
        <text x="44" y="155" fill="#c0caf5"> Created </text>
        <text x="130" y="155" fill="#7aa2f7">demo.svg</text>

        <text x="44" y="180" fill="#565f89">├─</text>
        <text x="70" y="180" fill="#7aa2f7">42</text>
        <text x="95" y="180" fill="#565f89"> frames</text>
        <text x="44" y="190" fill="#565f89">│</text>
        <text x="44" y="200" fill="#565f89">├─</text>
        <text x="70" y="200" fill="#ff9e64">2.5s</text>
        <text x="115" y="200" fill="#565f89"> duration</text>
        <text x="44" y="210" fill="#565f89">│</text>
        <text x="44" y="220" fill="#565f89">└─</text>
        <text x="70" y="220" fill="#73daca">12.4KB</text>
        <text x="135" y="220" fill="#565f89"> optimized</text>

        <text x="24" y="300" fill="#bb9af7">$</text>
        <rect x="44" y="286" width="10" height="18" fill="#c0caf5">
          <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite" calcMode="discrete"/>
        </rect>
      </g>
    </g>

    <!-- DVD Disc -->
    <g transform="translate(520, 100)" filter="url(#disc-shadow)">
      <g transform="rotate(-12, 200, 200)">
        <!-- Outer disc -->
        <circle cx="200" cy="200" r="195" fill="url(#disc-base)"/>

        <!-- Rainbow shimmer effect -->
        <circle cx="200" cy="200" r="195" fill="url(#holo)" opacity="0.12"/>

        <!-- Data tracks (concentric circles) -->
        <g stroke="#b0b0c0" stroke-width="0.4" fill="none" opacity="0.3">
          <circle cx="200" cy="200" r="55"/>
          <circle cx="200" cy="200" r="75"/>
          <circle cx="200" cy="200" r="95"/>
          <circle cx="200" cy="200" r="115"/>
          <circle cx="200" cy="200" r="135"/>
          <circle cx="200" cy="200" r="155"/>
          <circle cx="200" cy="200" r="175"/>
          <circle cx="200" cy="200" r="190"/>
        </g>

        <!-- Inner label area -->
        <circle cx="200" cy="200" r="52" fill="url(#label-grad)"/>
        <circle cx="200" cy="200" r="50" fill="none" stroke="#3d3d5c" stroke-width="1"/>

        <!-- Label content -->
        <g transform="translate(200, 200)">
          <!-- Glow behind title -->
          <text y="-8" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="32" fill="#7aa2f7" opacity="0.5" filter="url(#neon-glow)">dvd</text>
          <!-- Main title -->
          <text y="-8" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="32" fill="#fff">dvd</text>
          <!-- Version -->
          <text y="12" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#73daca">v1.0.0</text>
          <!-- Creator -->
          <text y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#888">tool3</text>
        </g>

        <!-- Center hole -->
        <circle cx="200" cy="200" r="18" fill="#1a1b26"/>
        <circle cx="200" cy="200" r="16" fill="none" stroke="#414868" stroke-width="1"/>

        <!-- Shine effect -->
        <ellipse cx="130" cy="130" rx="70" ry="28" fill="#fff" opacity="0.18" transform="rotate(-35, 130, 130)"/>

        <!-- Secondary shine -->
        <ellipse cx="280" cy="280" rx="40" ry="15" fill="#fff" opacity="0.08" transform="rotate(-35, 280, 280)"/>

        <!-- Curved text: demo.cd on bottom left edge -->
        <text font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#565f89" letter-spacing="2">
          <textPath href="#disc-edge-path" startOffset="25%">demo.cd</textPath>
        </text>
      </g>
    </g>

    <!-- Tagline - snapped to terminal left edge -->
    <g transform="translate(100, 480)">
      <text x="0" y="0" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#c0caf5">Output to animated SVG</text>
      <text x="0" y="35" text-anchor="start" font-family="'SF Mono', Monaco, monospace" font-size="14" fill="#565f89">Turn commands into beautiful animated SVG recordings</text>
      <text x="0" y="55" text-anchor="start" font-family="'SF Mono', Monaco, monospace" font-size="14" fill="#565f89">Zero dependencies. Optimized results.</text>
    </g>

    <!-- Feature pills - snapped to terminal left edge -->
    <g transform="translate(100, 560)" font-family="'SF Mono', Monaco, monospace" font-size="11">
      <g>
        <rect width="80" height="24" rx="12" fill="#7aa2f7" opacity="0.2"/>
        <text x="40" y="16" text-anchor="middle" fill="#7aa2f7">Pure SVG</text>
      </g>
      <g transform="translate(95, 0)">
        <rect width="90" height="24" rx="12" fill="#73daca" opacity="0.2"/>
        <text x="45" y="16" text-anchor="middle" fill="#73daca">Loop Styles</text>
      </g>
      <g transform="translate(200, 0)">
        <rect width="70" height="24" rx="12" fill="#bb9af7" opacity="0.2"/>
        <text x="35" y="16" text-anchor="middle" fill="#bb9af7">Themes</text>
      </g>
      <g transform="translate(285, 0)">
        <rect width="100" height="24" rx="12" fill="#ff9e64" opacity="0.2"/>
        <text x="50" y="16" text-anchor="middle" fill="#ff9e64">Optimized</text>
      </g>
    </g>
  </g>

  <!-- Decorative elements (outside the main content group) -->
  <g opacity="0.4">
    <circle cx="100" cy="60" r="3" fill="#7aa2f7"/>
    <circle cx="1100" cy="570" r="4" fill="#73daca"/>
    <circle cx="1080" cy="60" r="2" fill="#bb9af7"/>
  </g>
</svg>
