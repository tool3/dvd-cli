<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>

    <linearGradient id="disc-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0caf5"/>
      <stop offset="30%" stop-color="#e0e5f7"/>
      <stop offset="50%" stop-color="#f5f7fc"/>
      <stop offset="70%" stop-color="#e0e5f7"/>
      <stop offset="100%" stop-color="#c0caf5"/>
    </linearGradient>

    <linearGradient id="disc-rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9e64" stop-opacity="0.25"/>
      <stop offset="25%" stop-color="#f7768e" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#bb9af7" stop-opacity="0.25"/>
      <stop offset="75%" stop-color="#7aa2f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#73daca" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="label-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#73daca"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for label area on right side of disc -->
    <clipPath id="label-clip">
      <path d="M 200 200 L 200 50 A 150 150 0 0 1 200 350 Z" transform="translate(0, 0)"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Terminal Window -->
  <g transform="translate(200, 80)" filter="url(#shadow)">
    <!-- Terminal window frame -->
    <rect width="800" height="340" rx="12" fill="#16161e"/>

    <!-- Terminal header -->
    <rect width="800" height="40" rx="12" fill="#16161e"/>
    <rect y="28" width="800" height="12" fill="#16161e"/>

    <!-- Traffic lights -->
    <circle cx="24" cy="20" r="7" fill="#f7768e"/>
    <circle cx="48" cy="20" r="7" fill="#e0af68"/>
    <circle cx="72" cy="20" r="7" fill="#9ece6a"/>

    <!-- Title in header -->
    <text x="400" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#565f89">dvd — terminal</text>

    <!-- Terminal body -->
    <rect y="40" width="800" height="300" fill="#1a1b26"/>

    <!-- Terminal text lines -->
    <g font-family="'SF Mono', 'Monaco', 'Menlo', monospace" font-size="15">
      <text x="24" y="80" fill="#bb9af7">$</text>
      <text x="44" y="80" fill="#c0caf5"> dvd record demo.cd</text>

      <text x="24" y="115" fill="#565f89">...</text>
      <text x="55" y="115" fill="#73daca">Executing demo.cd</text>

      <text x="24" y="155" fill="#9ece6a">✓</text>
      <text x="44" y="155" fill="#c0caf5"> Created </text>
      <text x="130" y="155" fill="#7aa2f7">demo.svg</text>

      <text x="44" y="190" fill="#565f89">├─</text>
      <text x="80" y="190" fill="#7aa2f7">42</text>
      <text x="105" y="190" fill="#565f89"> frames</text>

      <text x="44" y="220" fill="#565f89">├─</text>
      <text x="80" y="220" fill="#ff9e64">2.5s</text>
      <text x="125" y="220" fill="#565f89"> duration</text>

      <text x="44" y="250" fill="#565f89">└─</text>
      <text x="80" y="250" fill="#73daca">12.4KB</text>
      <text x="150" y="250" fill="#565f89"> optimized</text>

      <text x="24" y="300" fill="#bb9af7">$</text>
      <rect x="44" y="286" width="10" height="18" fill="#c0caf5" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- DVD Disc (underneath terminal, partially visible) -->
  <g transform="translate(400, 280)" filter="url(#shadow)">
    <!-- Disc outer -->
    <circle cx="200" cy="200" r="195" fill="url(#disc-gradient)"/>

    <!-- Rainbow shimmer -->
    <circle cx="200" cy="200" r="195" fill="url(#disc-rainbow)"/>

    <!-- Disc tracks (concentric circles) -->
    <g stroke="#a9b1d6" stroke-width="0.5" fill="none" opacity="0.2">
      <circle cx="200" cy="200" r="60"/>
      <circle cx="200" cy="200" r="85"/>
      <circle cx="200" cy="200" r="110"/>
      <circle cx="200" cy="200" r="135"/>
      <circle cx="200" cy="200" r="160"/>
      <circle cx="200" cy="200" r="185"/>
    </g>

    <!-- Disc center ring -->
    <circle cx="200" cy="200" r="55" fill="#24283b"/>
    <circle cx="200" cy="200" r="52" fill="none" stroke="#414868" stroke-width="2"/>

    <!-- Center hole -->
    <circle cx="200" cy="200" r="20" fill="#1a1b26"/>
    <circle cx="200" cy="200" r="18" fill="none" stroke="#414868" stroke-width="1"/>

    <!-- Label area on right side of disc -->
    <g clip-path="url(#label-clip)" transform="translate(0, 0)">
      <!-- Label background -->
      <circle cx="200" cy="200" r="193" fill="url(#label-gradient)"/>

      <!-- Label text -->
      <g transform="translate(200, 200)">
        <text x="95" y="-40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#1a1b26">dvd</text>
        <text x="95" y="0" text-anchor="middle" font-family="'SF Mono', Monaco, monospace" font-size="12" font-weight="600" fill="#1a1b26" opacity="0.7">CLI</text>

        <!-- Small decorative text -->
        <text x="95" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#1a1b26" opacity="0.5">TERMINAL RECORDINGS</text>
        <text x="95" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#1a1b26" opacity="0.4">ANIMATED SVG</text>
      </g>
    </g>

    <!-- Shine on disc -->
    <ellipse cx="120" cy="120" rx="80" ry="35" fill="#ffffff" opacity="0.12" transform="rotate(-35, 120, 120)"/>
  </g>

  <!-- Tagline on right side -->
  <g transform="translate(920, 500)">
    <text x="0" y="0" font-family="'SF Mono', Monaco, monospace" font-size="14" fill="#565f89">Terminal → Animated SVG</text>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.4">
    <circle cx="80" cy="80" r="3" fill="#7aa2f7"/>
    <circle cx="1120" cy="550" r="4" fill="#73daca"/>
    <circle cx="1080" cy="80" r="2" fill="#bb9af7"/>
    <circle cx="120" cy="550" r="3" fill="#f7768e"/>
  </g>
</svg>
